<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html
    PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:f="http://xmlns.jcp.org/jsf/core" xmlns:p="http://primefaces.org/ui" dir="rtl">

<h:head>
    <title>TaskFlow - התחברות</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&amp;display=swap"
        rel="stylesheet" />
    <h:outputStylesheet library="css" name="common.css" />
    <style type="text/css">
        body {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ===== Auth Card ===== */
        .auth-card {
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
            width: 500px;
            padding: 40px 36px;
            animation: fadeIn 0.4s ease-out;
        }

        /* ===== Pill Toggle ===== */
        .auth-toggle {
            display: flex;
            background: #f0f0f2;
            border-radius: 50px;
            padding: 4px;
            margin-bottom: 32px;
        }

        .auth-toggle a {
            flex: 1;
            text-align: center;
            padding: 10px 0;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95em;
            color: #888;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .auth-toggle a.active {
            background: #ffffff;
            color: #333;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
        }

        .auth-toggle a:hover:not(.active) {
            color: #555;
        }

        /* ===== Titles ===== */
        .auth-title {
            font-size: 1.7em;
            font-weight: 800;
            color: #1a1a2e;
            text-align: center;
            margin-bottom: 6px;
        }

        .auth-subtitle {
            font-size: 0.95em;
            color: #999;
            text-align: center;
            margin-bottom: 28px;
        }

        /* ===== Auth form overrides ===== */
        .form-group {
            margin-bottom: 18px;
        }

        .form-group .ui-inputfield,
        .form-group input[type="text"],
        .form-group input[type="password"] {
            direction: rtl;
            text-align: right;
        }

        /* ===== Submit Button ===== */
        .auth-submit {
            width: 100% !important;
            padding: 14px 0 !important;
            border: none !important;
            border-radius: 50px !important;
            background: linear-gradient(135deg, #9b59b6 0%, #8e44ad 100%) !important;
            color: #fff !important;
            font-size: 1.05em !important;
            font-weight: 700 !important;
            font-family: 'Inter', sans-serif !important;
            cursor: pointer !important;
            transition: transform 0.15s ease, box-shadow 0.2s ease !important;
            margin-top: 8px;
        }

        .auth-submit:hover {
            transform: translateY(-1px) !important;
            box-shadow: 0 6px 20px rgba(155, 89, 182, 0.35) !important;
        }

        .auth-submit:active {
            transform: translateY(0) !important;
        }

        /* ===== Messages ===== */
        .auth-messages {
            margin-bottom: 16px;
        }
        
        .ui-messages > div {
            display: flex !important;
            align-items: center !important;
            position: relative !important;
            padding: 12px 16px !important;
            border-radius: 12px !important;
        }

        .ui-messages ul {
            margin: 0 !important;
            padding: 0 !important;
            list-style-type: none !important;
            flex: 1 !important;
            margin-right: 12px !important;
            margin-left: 28px !important;
            text-align: right !important;
        }

        .ui-messages li {
            display: block !important;
            line-height: 1.4 !important;
        }

        .ui-messages-close {
            position: absolute !important;
            left: 12px !important;
            right: auto !important;
            top: 50% !important;
            transform: translateY(-50%) !important;
            margin: 0 !important;
            float: none !important;
        }

        .ui-messages-error-icon, .ui-messages-info-icon, .ui-messages-warn-icon {
            position: static !important;
            display: block !important;
            float: none !important;
            margin: 0 !important;
        }
    </style>
</h:head>

<h:body>

    <div class="auth-card">

        <!-- Pill Toggle -->
        <div class="auth-toggle">
            <a href="login.xhtml" class="active">
                <i class="pi pi-sign-in"></i> התחברות
            </a>
            <a href="register.xhtml">
                <i class="pi pi-user-plus"></i> הרשמה
            </a>
        </div>

        <!-- Titles -->
        <div class="auth-title">ברוך הבא שוב</div>
        <div class="auth-subtitle">התחבר לחשבון שלך</div>

        <!-- Login Form -->
        <h:form id="loginForm">
            <div class="auth-messages">
                <p:messages id="messages" closable="true" showDetail="true" showSummary="false" />
            </div>

            <div class="form-group">
                <label for="username">שם משתמש</label>
                <p:inputText id="username" value="#{authBean.username}" required="true"
                    requiredMessage="שם משתמש הוא שדה חובה" placeholder="הכנס שם משתמש" />
            </div>

            <div class="form-group">
                <label for="password">סיסמה</label>
                <p:password id="password" value="#{authBean.password}" required="true"
                    requiredMessage="סיסמה היא שדה חובה" placeholder="••••••••" toggleMask="true" feedback="false"
                    styleClass="ltr-input" />
            </div>

            <p:commandButton value="התחבר לחשבון" action="#{authBean.login}" update="messages"
                styleClass="auth-submit" />
        </h:form>



    </div>

</h:body>

</html>
