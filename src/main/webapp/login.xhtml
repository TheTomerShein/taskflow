<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui">

<h:head>
    <title>TaskFlow - Login</title>
</h:head>

<h:body>
    <h:form>
        <p:panel header="Login to TaskFlow" style="width: 400px; margin: 50px auto;">
            <p:messages/>

            <p:outputLabel for="username" value="Username"/>
            <p:inputText id="username" value="#{authBean.username}" required="true"/>

            <p:outputLabel for="password" value="Password"/>
            <p:password id="password" value="#{authBean.password}" required="true"/>

            <p:commandButton value="Login" action="#{authBean.login}" update="@form" style="margin-top: 15px;"/>
            <p:commandButton value="Register" action="register?faces-redirect=true" style="margin-left: 10px;"/>
        </p:panel>
    </h:form>
</h:body>
</html>
