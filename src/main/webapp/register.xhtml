<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html
    PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui" dir="rtl">

<h:head>
    <title>TaskFlow - הרשמה</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&amp;display=swap" rel="stylesheet" />
    <style type="text/css">
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f5f5f7;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            direction: rtl;
        }

        .auth-card {
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
            width: 420px;
            padding: 40px 36px;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== Pill Toggle ===== */
        .auth-toggle {
            display: flex;
            background: #f0f0f2;
            border-radius: 50px;
            padding: 4px;
            margin-bottom: 32px;
        }

        .auth-toggle a {
            flex: 1;
            text-align: center;
            padding: 10px 0;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95em;
            color: #888;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .auth-toggle a.active {
            background: #ffffff;
            color: #333;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
        }

        .auth-toggle a:hover:not(.active) {
            color: #555;
        }

        /* ===== Titles ===== */
        .auth-title {
            font-size: 1.7em;
            font-weight: 800;
            color: #1a1a2e;
            text-align: center;
            margin-bottom: 6px;
        }

        .auth-subtitle {
            font-size: 0.95em;
            color: #999;
            text-align: center;
            margin-bottom: 28px;
        }

        /* ===== Form Groups ===== */
        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 0.88em;
            font-weight: 600;
            color: #555;
            margin-bottom: 6px;
            text-align: right;
        }

        /* Override PrimeFaces input styles */
        .form-group .ui-inputfield,
        .form-group input[type="text"],
        .form-group input[type="password"] {
            width: 100% !important;
            padding: 14px 18px !important;
            border: 1.5px solid #e8e8ec !important;
            border-radius: 50px !important;
            background: #fafafc !important;
            font-size: 0.95em !important;
            font-family: 'Inter', sans-serif !important;
            color: #333 !important;
            outline: none !important;
            transition: border-color 0.2s ease, box-shadow 0.2s ease !important;
            direction: ltr;
            text-align: left;
        }

        .form-group .ui-inputfield:focus,
        .form-group input[type="text"]:focus,
        .form-group input[type="password"]:focus {
            border-color: #9b59b6 !important;
            box-shadow: 0 0 0 3px rgba(155, 89, 182, 0.12) !important;
            background: #fff !important;
        }

        /* Password wrapper */
        .form-group .ui-password {
            width: 100% !important;
            display: block !important;
        }

        /* ===== Submit Button ===== */
        .auth-submit {
            width: 100% !important;
            padding: 14px 0 !important;
            border: none !important;
            border-radius: 50px !important;
            background: linear-gradient(135deg, #9b59b6 0%, #8e44ad 100%) !important;
            color: #fff !important;
            font-size: 1.05em !important;
            font-weight: 700 !important;
            font-family: 'Inter', sans-serif !important;
            cursor: pointer !important;
            transition: transform 0.15s ease, box-shadow 0.2s ease !important;
            margin-top: 8px;
        }

        .auth-submit:hover {
            transform: translateY(-1px) !important;
            box-shadow: 0 6px 20px rgba(155, 89, 182, 0.35) !important;
        }

        .auth-submit:active {
            transform: translateY(0) !important;
        }

        /* ===== Footer ===== */
        .auth-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 0.82em;
            color: #bbb;
        }

        /* ===== Messages ===== */
        .auth-messages {
            margin-bottom: 16px;
        }

        .auth-messages .ui-messages-error {
            background: #fff0f0 !important;
            border: 1px solid #ffcccc !important;
            border-radius: 12px !important;
            padding: 10px 16px !important;
            color: #c0392b !important;
        }

        .auth-messages .ui-messages-info {
            background: #f0fff4 !important;
            border: 1px solid #c6f6d5 !important;
            border-radius: 12px !important;
            padding: 10px 16px !important;
            color: #27ae60 !important;
        }
    </style>
</h:head>

<h:body>

    <div class="auth-card">

        <!-- Pill Toggle -->
        <div class="auth-toggle">
            <a href="login.xhtml">
                <i class="pi pi-sign-in"></i> התחברות
            </a>
            <a href="register.xhtml" class="active">
                <i class="pi pi-user-plus"></i> הרשמה
            </a>
        </div>

        <!-- Titles -->
        <div class="auth-title">צור חשבון חדש</div>
        <div class="auth-subtitle">הירשם כדי להתחיל לנהל פרויקטים</div>

        <!-- Register Form -->
        <h:form id="registerForm">
            <div class="auth-messages">
                <p:messages id="messages" closable="true" />
            </div>

            <div class="form-group">
                <label for="username">שם משתמש</label>
                <p:inputText id="username" value="#{authBean.username}" required="true"
                    requiredMessage="שם משתמש הוא שדה חובה"
                    placeholder="הכנס שם משתמש" />
            </div>

            <div class="form-group">
                <label for="email">אימייל</label>
                <p:inputText id="email" value="#{authBean.email}" required="true"
                    requiredMessage="אימייל הוא שדה חובה"
                    placeholder="example@email.com" />
            </div>

            <div class="form-group">
                <label for="password">סיסמה</label>
                <p:password id="password" value="#{authBean.password}" required="true"
                    requiredMessage="סיסמה היא שדה חובה"
                    placeholder="••••••••"
                    toggleMask="true" feedback="false" />
            </div>

            <p:commandButton value="צור חשבון" action="#{authBean.register}"
                update="messages" styleClass="auth-submit" />
        </h:form>

        <!-- Footer -->
        <div class="auth-footer">
            עיצוב מינימליסטי • בטוח ומאובטח
        </div>

    </div>

</h:body>

</html>
