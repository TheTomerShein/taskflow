<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html
    PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets" dir="rtl">

<h:head>
    <title>TaskFlow - דשבורד</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&amp;display=swap" rel="stylesheet" />
    <h:outputStylesheet library="css" name="common.css" />
    <style type="text/css">
        .dashboard-container {
            max-width: 960px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        /* ===== Header Card ===== */
        .dash-header {
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
            padding: 28px 36px;
            margin-bottom: 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: fadeIn 0.4s ease-out;
        }

        .dash-header h1 {
            font-size: 1.6em;
            font-weight: 800;
            color: #1a1a2e;
        }

        .dash-header p {
            color: #999;
            font-size: 0.92em;
            margin-top: 4px;
        }

        .logout-btn {
            padding: 10px 24px !important;
            border: none !important;
            border-radius: 50px !important;
            background: #f5f5f7 !important;
            color: #c0392b !important;
            font-weight: 600 !important;
            font-family: 'Inter', sans-serif !important;
            cursor: pointer !important;
            transition: all 0.2s ease !important;
        }

        .logout-btn:hover {
            background: #fdecea !important;
        }

        /* ===== Section Title override ===== */
        .section-title {
            padding-right: 4px;
        }

        /* ===== Project Cards ===== */
        .projects-scroll-container {
            max-height: 380px;
            overflow-y: auto;
            padding: 10px 8px;
            margin-bottom: 24px;
            border-radius: 16px;
        }

        /* Custom scrollbar */
        .projects-scroll-container::-webkit-scrollbar {
            width: 8px;
        }
        .projects-scroll-container::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        .projects-scroll-container::-webkit-scrollbar-thumb {
            background: #d4b8e8;
            border-radius: 10px;
        }
        .projects-scroll-container::-webkit-scrollbar-thumb:hover {
            background: #9b59b6;
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }

        .project-card {
            background: #ffffff;
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.05);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            cursor: pointer;
            text-decoration: none;
            display: block;
            color: inherit;
            border: 1.5px solid transparent;
        }

        .project-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 28px rgba(155, 89, 182, 0.12);
            border-color: #e8d5f5;
        }

        .project-card .project-icon {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            background: linear-gradient(135deg, #9b59b6 0%, #8e44ad 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2em;
            margin-bottom: 14px;
        }

        .project-card .project-name {
            font-weight: 700;
            font-size: 1.08em;
            color: #1a1a2e;
            margin-bottom: 6px;
        }

        .project-card .project-desc {
            font-size: 0.85em;
            color: #999;
            line-height: 1.5;
            margin-bottom: 12px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .project-card .project-date {
            font-size: 0.78em;
            color: #bbb;
        }

        /* ===== Create Project Card ===== */
        .create-card {
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
            padding: 28px 36px;
            animation: fadeIn 0.4s ease-out 0.1s both;
        }

        .create-btn {
            padding: 14px 32px !important;
            border: none !important;
            border-radius: 50px !important;
            background: linear-gradient(135deg, #9b59b6 0%, #8e44ad 100%) !important;
            color: #fff !important;
            font-size: 1em !important;
            font-weight: 700 !important;
            font-family: 'Inter', sans-serif !important;
            cursor: pointer !important;
            transition: transform 0.15s ease, box-shadow 0.2s ease !important;
        }

        .create-btn:hover {
            transform: translateY(-1px) !important;
            box-shadow: 0 6px 20px rgba(155, 89, 182, 0.35) !important;
        }
    </style>
</h:head>

<h:body>
    <div class="dashboard-container">
        <h:form id="dashForm">

            <!-- Header -->
            <div class="dash-header">
                <div>
                    <h1>שלום, #{authBean.currentUser.username} 👋</h1>
                    <p>נהל את הפרויקטים והמשימות שלך</p>
                </div>
                <p:commandButton value="התנתק" icon="pi pi-sign-out"
                    action="#{authBean.logout}" ajax="false" immediate="true"
                    styleClass="logout-btn" />
            </div>

            <p:growl id="messages" showDetail="true" showSummary="false" life="3000" />

            <!-- Projects Section -->
            <div class="section-title">
                <i class="pi pi-folder" style="margin-left: 6px; color: #9b59b6;"></i>
                הפרויקטים שלי
            </div>

            <h:panelGroup rendered="#{not empty dashboardBean.projects}" layout="block">
                <div class="projects-scroll-container">
                    <div class="projects-grid">
                        <ui:repeat value="#{dashboardBean.projects}" var="project">
                            <h:link outcome="project" styleClass="project-card">
                                <f:param name="projectId" value="#{project.id}" />
                                <div class="project-icon">
                                    <i class="pi pi-folder"></i>
                                </div>
                                <div class="project-name">#{project.name}</div>
                                <div class="project-desc">
                                    #{empty project.description ? 'ללא תיאור' : project.description}
                                </div>
                                <div class="project-date">
                                    נוצר:
                                    <h:outputText value="#{project.createdAt}">
                                        <f:convertDateTime type="localDateTime" pattern="dd/MM/yyyy" />
                                    </h:outputText>
                                </div>
                            </h:link>
                        </ui:repeat>
                    </div>
                </div>
            </h:panelGroup>

            <h:panelGroup rendered="#{empty dashboardBean.projects}" layout="block">
                <div class="empty-state">
                    <i class="pi pi-inbox"></i>
                    <h3>עדיין אין פרויקטים</h3>
                    <p>צור את הפרויקט הראשון שלך למטה!</p>
                </div>
            </h:panelGroup>

            <!-- Create Project -->
            <div class="section-title" style="margin-top: 8px;">
                <i class="pi pi-plus-circle" style="margin-left: 6px; color: #9b59b6;"></i>
                צור פרויקט חדש
            </div>

            <div class="create-card">
                <div class="form-group">
                    <label>שם הפרויקט *</label>
                    <p:inputText value="#{dashboardBean.newProjectName}" required="true"
                        requiredMessage="שם הפרויקט הוא שדה חובה"
                        placeholder="למשל: TaskFlow, Marketing Campaign..." />
                </div>

                <div class="form-group">
                    <label>תיאור (אופציונלי)</label>
                    <p:inputTextarea value="#{dashboardBean.newProjectDescription}" rows="3"
                        placeholder="תאר את הפרויקט שלך..." />
                </div>

                <p:commandButton value="צור פרויקט" icon="pi pi-plus"
                    action="#{dashboardBean.createProject}" update="dashForm"
                    styleClass="create-btn" />
            </div>

        </h:form>
    </div>
</h:body>

</html>
