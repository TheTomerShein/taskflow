<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:p="http://primefaces.org/ui">

<h:head>
    <title>TaskFlow - Hello PrimeFaces</title>
</h:head>

<h:body>
    <p:growl/>

    <h1 style="text-align: center; margin-top: 50px;">
        🎉 TaskFlow - שלב 1 הושלם!
    </h1>

    <p:panel header="בדיקת PrimeFaces" style="width: 600px; margin: 30px auto;">
        <h:form>
            <p:commandButton value="לחץ כאן"
                             action="#{helloBean.sayHello}"
                             update="msg"
                             icon="pi pi-check"/>

            <p:messages id="msg"/>
        </h:form>
    </p:panel>
</h:body>
</html>
